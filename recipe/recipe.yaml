context:
  version: "0.0.12"
  python_min: "3.11"

recipe:
  name: diracx
  version: ${{ version }}

build:
  number: 0

outputs:
  - package:
      name: diracx-api

    source:
      - url: https://pypi.org/packages/source/d/diracx-api/diracx_api-${{ version }}.tar.gz
        sha256: b99732a2acdb36f37e0f9f5f81e64ce671d21d2052d89a3be613b7e29ca75596
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - diracx-client ==${{ version }}
        - diracx-core ==${{ version }}
        - httpx
        - zstandard

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.api
          pip_check: true

    about:
      summary: Python API for interacting with DiracX services

  - package:
      name: diracx-cli

    source:
      - url: https://pypi.org/packages/source/d/diracx-cli/diracx_cli-${{ version }}.tar.gz
        sha256: 1ff5549c93a48fcdff34952b8f6643ca111c64affaa71f067b4248ef6d9f557e
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      python:
        entry_points:
          - dirac = diracx.cli:app
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - diraccfg
        - diracx-api ==${{ version }}
        - diracx-client ==${{ version }}
        - diracx-core ==${{ version }}
        - gitpython
        - pydantic >=2.10
        - pyyaml
        - rich
        - typer >=0.15.4

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.cli
          pip_check: true
      - script:
          - dirac --help

    about:
      summary: Command line interface for DiracX

  - package:
      name: diracx-client

    source:
      - url: https://pypi.org/packages/source/d/diracx-client/diracx_client-${{ version }}.tar.gz
        sha256: b404aca03767249c83157ade05029a56c73663b6a3998d57daf702f35c61d424
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - azure-core
        - diracx-core ==${{ version }}
        - httpx
        - isodate
        - pyjwt

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.client
          pip_check: true

    about:
      summary: Client library for DiracX services from OpenAPI specifications

  - package:
      name: diracx-core

    source:
      - url: https://pypi.org/packages/source/d/diracx-core/diracx_core-${{ version }}.tar.gz
        sha256: 3c2a7f80d25302b864189494a047c4f9008ace87f912fc5d2e67883912d903c5
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - aiobotocore >=2.15
        - botocore >=1.35
        - cachetools
        - diraccommon >=9.0.0
        - email-validator
        - gitpython
        - joserfc >=1.1.0
        - pydantic-settings
        - pydantic >=2.10
        - pyyaml
        - sh

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.core
          pip_check: true

    about:
      summary: Common code used by all DiracX packages
      license: GPL-3.0-only

  - package:
      name: diracx-db

    source:
      - url: https://pypi.org/packages/source/d/diracx-db/diracx_db-${{ version }}.tar.gz
        sha256: 245e4c78ab1e10d9990357992c8082738c90578e3c4640f326754bbaea6f0997
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - diracx-core ==${{ version }}
        - opensearch-py
        - aiohttp>=3.12.14,<4 # Needed for opensearch-py's async extra
        - pydantic >=2.10
        - python-dateutil
        - sqlalchemy-with-aiomysql
        - sqlalchemy-with-aiosqlite
        - uuid-utils

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.db
          pip_check: true

    about:
      summary: Data Access Layer for DiracX database functionalities

  - package:
      name: diracx-logic

    source:
      - url: https://pypi.org/packages/source/d/diracx-logic/diracx_logic-${{ version }}.tar.gz
        sha256: 225652e1d6ebb911fc9c2551be1e688061da8536e26b952081fae1ec73774c6d
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - cachetools
        - diraccommon >=9.0.0
        - diracx-core ==${{ version }}
        - diracx-db ==${{ version }}
        - joserfc
        - pydantic >=2.10
        - uuid-utils

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.logic
          pip_check: true

    about:
      summary: Business Logic Layer containing DiracX logic
      description: ''
      license: GPL-3.0-only

  - package:
      name: diracx-routers

    source:
      - url: https://pypi.org/packages/source/d/diracx-routers/diracx_routers-${{ version }}.tar.gz
        sha256: 970e744d688a95093d9019f42d6d06bbff9e92417fa59edb1d1371d52e5ee099
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - cachetools
        - diracx-core ==${{ version }}
        - diracx-db ==${{ version }}
        - diracx-logic ==${{ version }}
        - fastapi
        - httpx
        - joserfc
        - opentelemetry-api
        - opentelemetry-exporter-otlp
        - opentelemetry-instrumentation-fastapi
        - opentelemetry-instrumentation-logging
        - opentelemetry-sdk
        - pydantic >=2.10
        - python-dotenv
        - python-multipart
        - uvicorn

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.routers
          pip_check: true

    about:
      summary: FastAPI routers providing HTTP endpoints for DiracX services

  - package:
      name: diracx-testing

    source:
      - url: https://pypi.org/packages/source/d/diracx-testing/diracx_testing-${{ version }}.tar.gz
        sha256: 02986394fa7a4ebaea638a8010a8e406d87248bef0b243bb01b8d528dafc0d5d
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - diracx-core ==${{ version }}
        - httpx
        - joserfc
        - pytest
        - pytest-asyncio >=1.1.0
        - pytest-cov
        - pytest-github-actions-annotate-failures
        - pytest-lazy-fixtures
        - pytest-xdist
        - uuid-utils

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.testing
          pip_check: true

    about:
      summary: Testing utilities and fixtures for DiracX development

  - package:
      name: diracx

    source:
      - url: https://pypi.org/packages/source/d/diracx/diracx-${{ version }}.tar.gz
        sha256: 77d51834a70734edd6a25ed2988162ba4c4dff9a2b5d661bd14b7280cf077d6d
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - diracx-api ==${{ version }}
        - diracx-cli ==${{ version }}
        - diracx-client ==${{ version }}
        - diracx-core ==${{ version }}

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx
            - diracx.core
            - diracx.api
            - diracx.cli
            - diracx.client
          pip_check: true

    about:
      summary: Client installation for users of DiracX installations

about:
  summary: A framework for managing grid-style resources
  homepage: https://diracx.diracgrid.org/
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  feedstock-name: diracx
  recipe-maintainers:
    - chrisburr
