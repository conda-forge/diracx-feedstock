context:
  version: "0.0.14"
  python_min: "3.11"

recipe:
  name: diracx
  version: ${{ version }}

build:
  number: 0

outputs:
  - package:
      name: diracx-api

    source:
      - url: https://pypi.org/packages/source/d/diracx-api/diracx_api-${{ version }}.tar.gz
        sha256: 8a6b330ed1e32a657c02bf82976faa1fb3cb65e156724ee5bb6c24eb88fe6e8d
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - diracx-client ==${{ version }}
        - diracx-core ==${{ version }}
        - httpx
        - zstandard

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.api
          pip_check: true

    about:
      summary: Python API for interacting with DiracX services

  - package:
      name: diracx-cli

    source:
      - url: https://pypi.org/packages/source/d/diracx-cli/diracx_cli-${{ version }}.tar.gz
        sha256: 31de4a5dd7aea237fb9c4ff65553f8c1330ee164c4545c119bd94fc7afba5a67
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      python:
        entry_points:
          - dirac = diracx.cli:app
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - diraccfg
        - diracx-api ==${{ version }}
        - diracx-client ==${{ version }}
        - diracx-core ==${{ version }}
        - gitpython
        - pydantic >=2.10
        - pyyaml
        - rich
        - typer >=0.15.4

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.cli
          pip_check: true
      - script:
          - dirac --help

    about:
      summary: Command line interface for DiracX

  - package:
      name: diracx-client

    source:
      - url: https://pypi.org/packages/source/d/diracx-client/diracx_client-${{ version }}.tar.gz
        sha256: 2787bd17aaecd3395d780ecaf15a0ff6e5d8c4302dab2d5382ed52a42d2520da
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - azure-core
        - diracx-core ==${{ version }}
        - httpx
        - isodate
        - pyjwt

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.client
          pip_check: true

    about:
      summary: Client library for DiracX services from OpenAPI specifications

  - package:
      name: diracx-core

    source:
      - url: https://pypi.org/packages/source/d/diracx-core/diracx_core-${{ version }}.tar.gz
        sha256: 6472f7b55d08c3bb5bf323a74f40fa62912d9e5926212be554b00c7d15ef07db
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - aiobotocore >=2.15
        - botocore >=1.35
        - cachetools
        - diraccommon >=9.0.0
        - email-validator
        - gitpython
        - joserfc >=1.1.0
        - pydantic-settings
        - pydantic >=2.10
        - pyyaml
        - sh

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.core
          pip_check: true

    about:
      summary: Common code used by all DiracX packages
      license: GPL-3.0-only

  - package:
      name: diracx-db

    source:
      - url: https://pypi.org/packages/source/d/diracx-db/diracx_db-${{ version }}.tar.gz
        sha256: b887947fa518cf0f28237e05fa140c95df55e2e0d5e7e53b60714302de603219
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - diracx-core ==${{ version }}
        - opensearch-py
        - aiohttp>=3.12.14,<4 # Needed for opensearch-py's async extra
        - pydantic >=2.10
        - python-dateutil
        - sqlalchemy-with-aiomysql
        - sqlalchemy-with-aiosqlite
        - uuid-utils

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.db
          pip_check: true

    about:
      summary: Data Access Layer for DiracX database functionalities

  - package:
      name: diracx-logic

    source:
      - url: https://pypi.org/packages/source/d/diracx-logic/diracx_logic-${{ version }}.tar.gz
        sha256: 27f5fdc6d5dd41e36653c62c113cee7a57f53d3e29140c40126115ccb3c51721
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - cachetools
        - diraccommon >=9.0.0
        - diracx-core ==${{ version }}
        - diracx-db ==${{ version }}
        - joserfc
        - pydantic >=2.10
        - uuid-utils

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.logic
          pip_check: true

    about:
      summary: Business Logic Layer containing DiracX logic
      description: ''
      license: GPL-3.0-only

  - package:
      name: diracx-routers

    source:
      - url: https://pypi.org/packages/source/d/diracx-routers/diracx_routers-${{ version }}.tar.gz
        sha256: 4b1b29702addf43a05b89b8fa9ee3d6dd62dcc6e8745516ccf6218cad3c18cc1
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - cachetools
        - diracx-core ==${{ version }}
        - diracx-db ==${{ version }}
        - diracx-logic ==${{ version }}
        - diracx-tasks ==${{ version }}
        - fastapi >=0.121.0
        - httpx
        - joserfc
        - opentelemetry-api >=1.40.0
        - opentelemetry-exporter-otlp >=1.40.0
        - opentelemetry-instrumentation-fastapi >=0.61b0
        - opentelemetry-instrumentation-logging >=0.61b0
        - opentelemetry-sdk >=1.40.0
        - pydantic >=2.10
        - python-dotenv
        - python-multipart
        - uvicorn

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.routers
          pip_check: true

    about:
      summary: FastAPI routers providing HTTP endpoints for DiracX services

  - package:
      name: diracx-tasks

    source:
      - url: https://pypi.org/packages/source/d/diracx-tasks/diracx_tasks-${{ version }}.tar.gz
        sha256: 119937d38a9f63cfa86893cca7372a03a8500aed627f329dff2a182942ddfde3
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      python:
        entry_points:
          - diracx-task-run = diracx.tasks.task_run:main
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - croniter
        - diracx-core ==${{ version }}
        - diracx-db ==${{ version }}
        - diracx-logic ==${{ version }}
        - fastapi >=0.121.0
        - hiredis
        - msgpack-python
        - opentelemetry-api
        - pydantic >=2.10
        - python-dateutil
        - redis-py

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.tasks
          pip_check: true

    about:
      summary: Asynchronous task system for DiracX

  - package:
      name: diracx-testing

    source:
      - url: https://pypi.org/packages/source/d/diracx-testing/diracx_testing-${{ version }}.tar.gz
        sha256: dc90f8b5b6e4e3710e0a6f7d16a592447d253d4319b935b23d2b33609b18231a
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - diracx-core ==${{ version }}
        - httpx
        - joserfc
        - pytest
        - pytest-asyncio >=1.1.0
        - pytest-cov
        - pytest-github-actions-annotate-failures
        - pytest-lazy-fixtures
        - pytest-xdist
        - uuid-utils

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx.testing
          pip_check: true

    about:
      summary: Testing utilities and fixtures for DiracX development

  - package:
      name: diracx

    source:
      - url: https://pypi.org/packages/source/d/diracx/diracx-${{ version }}.tar.gz
        sha256: e293ac246d1bf3c1a5375403e73690727106de41858e610ed761b4b7c7220d9c
      - url: https://raw.githubusercontent.com/DIRACGrid/diracx/refs/tags/v${{ version }}/LICENSE
        sha256: bb2af8a15ea39a351e7a95d93cf8e4251c1ae6ae4cac8ee3a89cf9b155cd6e54

    build:
      script: ${{ PYTHON }} -m pip install .
      noarch: python

    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - hatch-vcs
        - pip
      run:
        - python >=${{ python_min }}
        - diracx-api ==${{ version }}
        - diracx-cli ==${{ version }}
        - diracx-client ==${{ version }}
        - diracx-core ==${{ version }}

    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - diracx
            - diracx.core
            - diracx.api
            - diracx.cli
            - diracx.client
          pip_check: true

    about:
      summary: Client installation for users of DiracX installations

about:
  summary: A framework for managing grid-style resources
  homepage: https://diracx.diracgrid.org/
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  feedstock-name: diracx
  recipe-maintainers:
    - chrisburr
